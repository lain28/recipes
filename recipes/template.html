<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YUM</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <h1 class="site-title">RECIPES</h1>

        <div class="top-buttons">
          <button
            id="themeToggle"
            class="icon-btn"
            type="button"
            aria-label="Toggle dark mode"
            title="Toggle dark mode"
          >
            🌙
          </button>

            id="sidebarToggle"
            class="icon-btn"
            type="button"
            aria-label="Collapse sidebar"
            title="Collapse sidebar"
          >
            ☰
          </button>
        </div>
      </div>

      <div class="sidebar-controls">

          Home
        </button>

        <button id="categoriesToggle" class="control-btn" type="button">
          Categories ▾
        </button>

        <div id="categoryMenu" class="category-menu hidden">
          <button class="control-btn category-btn" type="button" data-category="All">
            All
          </button>
          <button class="control-btn category-btn" type="button" data-category="Meal">
            Meal
          </button>
          <button class="control-btn category-btn" type="button" data-category="Bakery">
            Bakery
          </button>
        </div>
      </div>

      <div id="recipe-list" class="recipe-list"></div>
    </aside>

    <!-- START EDITING HERE -->

      <div class="recipe-page">

          <ol>
